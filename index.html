<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación 80</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-image: url('invitacion80.jpg');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;   /* Hace que cubra toda la pantalla */
      background-attachment: fixed;
    }

    @media (max-width: 768px) {
      body {
        background-attachment: scroll; /* Evita problemas en móviles */
      }
    }
  </style>
</head>
<body>
  <img src="invitacion80.jpg" alt="Invitación 80 años">
</body>
</html>
